<!DOCTYPE html>
<html>

<head>
    <title>AI Diet Recommendation</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #89f7fe, #66a6ff);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
        }

        .title {
            color: white;
            margin-bottom: 20px;
            font-size: 32px;
        }

        .card {
            background: white;
            padding: 35px;
            border-radius: 18px;
            width: 350px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            animation: fadeIn 1s;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus,
        select:focus {
            outline: none;
            border: 1px solid #4CAF50;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2e7d32;
            transform: scale(1.03);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

</head>

<body>

    <div class="container">

        <h2 class="title">🥗 Personalized Meal Recommendation</h2>

        <div class="card">

            <form action="/recommend" method="post">

                <input type="text" name="name" placeholder="Your Name" required>

                <input type="number" name="age" placeholder="Age" required>

                <input type="number" step="0.1" name="height" placeholder="Height (ft)" required>

                <input type="number" step="0.1" name="weight" placeholder="Weight (kg)" required>

                <select name="disease">

                    <option value="none">No Disease</option>
                    <option value="diabetes">Diabetes</option>
                    <option value="hypertension">Hypertension</option>
                    <option value="heart disease">Heart Disease</option>
                    <option value="obesity">Obesity</option>

                </select>

                <br><br>

                <button type="submit">Get My Diet Plan</button>

            </form>

        </div>

    </div>

</body>

</html>
